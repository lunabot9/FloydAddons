name: "Release: MC 1.21.10 + 1.21.11"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Calculate next version
        id: version
        run: |
          # Gather all vX.Y.Z(-mcX.Y.ZZ) tags and pick the highest base version
          TAGS=$(gh release list --limit 100 --json tagName -q '.[].tagName' 2>/dev/null || true)
          LATEST=$(echo "$TAGS" | sed -n 's/^v//p' | sed 's/-mc.*//' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)

          if [ -z "$LATEST" ]; then
            echo "version=1.0.1" >> "$GITHUB_OUTPUT"
            echo "First release: v1.0.1"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
            PATCH=$((PATCH + 1))
            if [ "$PATCH" -ge 10 ]; then
              PATCH=0
              MINOR=$((MINOR + 1))
            fi
            if [ "$MINOR" -ge 10 ]; then
              MINOR=0
              MAJOR=$((MAJOR + 1))
            fi
            NEXT="${MAJOR}.${MINOR}.${PATCH}"
            echo "version=$NEXT" >> "$GITHUB_OUTPUT"
            echo "Next release: v$NEXT (was v$LATEST)"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build for 1.21.10
        run: ./gradlew clean build --no-daemon -Ptarget_mc=1.21.10 -Pmod_version=${{ steps.version.outputs.version }}-mc1.21.10

      - name: Build for 1.21.11
        run: ./gradlew build --no-daemon -Ptarget_mc=1.21.11 -Pmod_version=${{ steps.version.outputs.version }}-mc1.21.11

      - name: Upload build artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: floydaddons-${{ steps.version.outputs.version }}-multi
          path: |
            app/build/libs/floydaddons-${{ steps.version.outputs.version }}-mc1.21.10.jar
            app/build/libs/floydaddons-${{ steps.version.outputs.version }}-mc1.21.11.jar

      - name: Create GitHub Release (MC 1.21.10)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-mc1.21.10
          name: FloydAddons v${{ steps.version.outputs.version }} (MC 1.21.10)
          body: |
            ${{ github.event.head_commit.message }}

            ---
            **Minecraft 1.21.10**
          files: app/build/libs/floydaddons-${{ steps.version.outputs.version }}-mc1.21.10.jar
          draft: false
          prerelease: false

      - name: Create GitHub Release (MC 1.21.11)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-mc1.21.11
          name: FloydAddons v${{ steps.version.outputs.version }} (MC 1.21.11)
          body: |
            ${{ github.event.head_commit.message }}

            ---
            **Minecraft 1.21.11**
          files: app/build/libs/floydaddons-${{ steps.version.outputs.version }}-mc1.21.11.jar
          draft: false
          prerelease: false
