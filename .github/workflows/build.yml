name: build
on: [ pull_request, push ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        java: [ 21 ]
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: setup jdk ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: ${{ matrix.java }}

      - name: setup gradle
        uses: gradle/actions/setup-gradle@v4

      # Compiles the mod, runs the test suite (src/test), and produces the runtime jar.
      # This is the step the old workflow was missing entirely — without it no jar was ever
      # built and the tests never ran, so CI "passed" without actually verifying or producing
      # anything. (The old per-push scripts/ chmod + skipped verify step are gone.)
      - name: build and test
        run: ./gradlew build --stacktrace

      # Per-build artifact, handy for PRs / non-main pushes.
      - name: upload build jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: FloydAddons-${{ github.sha }}
          path: |
            build/libs/FloydAddons-*.jar
            !build/libs/FloydAddons-*-sources.jar

      # Publish (or refresh) the GitHub Release with the runtime jar on every push to main.
      # The tag is derived from mod_version in gradle.properties (e.g. v2.1.0): bumping the
      # version cuts a new release, re-pushing the same version refreshes that release's jar.
      - name: publish release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          version="$(grep -E '^mod_version=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')"
          tag="v${version}"

          runtime_jars=()
          for jar in build/libs/FloydAddons-*.jar; do
            [[ "$jar" == *-sources.jar ]] && continue
            runtime_jars+=("$jar")
          done
          if [[ "${#runtime_jars[@]}" -ne 1 ]]; then
            printf 'found: %s\n' "${runtime_jars[@]:-<none>}"
            echo "expected exactly one FloydAddons runtime jar in build/libs" >&2
            exit 1
          fi
          jar="${runtime_jars[0]}"
          echo "Releasing ${jar} as ${tag}"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release ${tag} exists — updating its jar."
            gh release upload "$tag" "$jar" --clobber
          else
            echo "Creating release ${tag}."
            gh release create "$tag" "$jar" \
              --target "$GITHUB_SHA" \
              --title "FloydAddons ${version} (MC 1.21.11)" \
              --notes "Odin-based FloydAddons for Minecraft 1.21.11. Built from ${GITHUB_SHA}."
          fi
